<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>樹高測定</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#28a745"> 
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #222;
            color: white;
        }

        /* 背景ビデオ設定 */
        #camera-view {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
            background-color: #000;
            transform-origin: center center;
            transition: transform 0.1s ease-out;
        }

        /* 照準線 */
        .crosshair {
            position: fixed;
            top: 50%; left: 0; width: 100%; height: 2px;
            background-color: rgba(255, 0, 0, 0.7);
            pointer-events: none;
            z-index: 5;
        }
        .crosshair-v {
            position: fixed;
            top: 20%; left: 50%; width: 2px; height: 60%;
            background-color: rgba(255, 0, 0, 0.4);
            pointer-events: none;
            z-index: 5;
        }

        /* リアルタイム樹高表示 */
        #realtime-height {
            position: fixed;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            font-weight: bold;
            color: #28a745;
            text-shadow: 2px 2px 4px #000, -1px -1px 0 #fff;
            pointer-events: none;
            display: none;
            z-index: 10;
        }

        /* スタート画面 */
        #start-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 999;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px;
        }
        
        /* 再起動(センサー再許可)画面 */
        #restart-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 1000;
            display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px;
        }

        /* UIコンテナ */
        .ui-container {
            position: absolute; bottom: 0; left: 0; width: 100%;
            padding: 20px 20px 40px 20px; box-sizing: border-box;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
            display: none; flex-direction: column; gap: 10px; z-index: 20;
        }

        .top-info {
            position: absolute; top: 0; left: 0; width: 100%;
            padding: 10px; background: rgba(0,0,0,0.3);
            text-align: center; pointer-events: none; z-index: 20;
        }

        .debug-info { font-size: 0.7rem; color: #aaa; margin-bottom: 5px; }
        .angle-display { font-size: 2.5rem; font-weight: bold; color: #ffcc00; text-shadow: 2px 2px 0px #000; }

        /* ズームスライダー */
        .zoom-control {
            margin: 15px auto 0 auto; display: flex; align-items: center; justify-content: center; gap: 10px;
            background: rgba(0,0,0,0.6); padding: 8px 15px; border-radius: 20px; width: fit-content; pointer-events: auto;
        }
        .zoom-control input[type="range"] { width: 150px; }

        /* ボタン類 */
        button {
            padding: 15px; font-size: 1.2rem; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; transition: transform 0.1s;
        }
        button:active { transform: scale(0.98); }
        .btn-primary { background-color: #007bff; width: 100%; margin-bottom: 10px; }
        .btn-success { background-color: #28a745; width: 100%; margin-bottom: 10px; }
        .btn-info { background-color: #17a2b8; width: 100%; margin-bottom: 10px; }
        .btn-secondary { background-color: #6c757d; width: 100%; margin-bottom: 10px; }
        .btn-start { background-color: #28a745; font-size: 1.5rem; padding: 20px 40px; border-radius: 50px; }
        .btn-restart { background-color: #ff9800; font-size: 1.3rem; padding: 20px; border-radius: 12px; width: 90%; max-width: 400px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        
        .toggle-btn {
            background: rgba(255,255,255,0.2); font-size: 0.8rem; padding: 5px 10px; border-radius: 4px; pointer-events: auto; margin-top: 5px;
        }

        /* 結果表示 */
        .result-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100;
        }
        .result-box {
            background: white; color: #333; padding: 30px; border-radius: 15px; text-align: center; width: 85%; max-width: 400px;
        }
        .big-number { font-size: 3.5rem; font-weight: bold; color: #28a745; margin: 10px 0; }

        /* スクショ撮影UI */
        #screenshot-ui {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: none; flex-direction: column; justify-content: space-between; z-index: 50;
        }
        .screenshot-info {
            margin: 20px; padding: 15px; background: rgba(0,0,0,0.6); border: 2px solid #fff; border-radius: 10px;
            color: white; font-size: 1.2rem; font-weight: bold; text-shadow: 1px 1px 3px #000;
        }
        .screenshot-controls {
            margin: 20px; display: flex; flex-direction: column; gap: 10px;
        }

        /* ステップ */
        .step-dots { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; }
        .dot { width: 12px; height: 12px; background: #ccc; border-radius: 50%; }
        .dot.active { background: #007bff; transform: scale(1.3); }
        .dot.done { background: #28a745; }
        
        select { font-size: 1.2rem; padding: 8px; border-radius: 5px; }
        .control-panel { background: rgba(255,255,255,0.95); padding: 20px; border-radius: 15px; color: #333; text-align: center; }
    </style>
</head>
<body>

    <video id="camera-view" autoplay playsinline muted></video>

    <div class="crosshair" id="ch-h"></div>
    <div class="crosshair-v" id="ch-v"></div>

    <div id="realtime-height">0.0 m</div>

    <div id="start-overlay">
        <h1 style="margin-bottom:10px;">樹高測定 v1.6<br><small>ズーム機能・画像保存版</small></h1>
        <p style="font-size:0.9rem; color:#ccc; margin-bottom:30px;">
            位置情報(GPS)へのアクセスを許可すると、<br>証拠写真に緯度経度を合成できます。
        </p>
        <button class="btn-start" onclick="startApp()">測定スタート</button>
        <p id="error-log" style="color:red; margin-top:20px; font-size:0.8rem;"></p>
    </div>

    <div id="restart-overlay">
        <h2 style="color:#28a745; margin-bottom:10px;">画像保存完了</h2>
        <p style="font-size:0.95rem; color:#ddd; margin-bottom:40px; line-height:1.6;">
            画像をダウンロードしました。<br>
            iOSの仕様上、保存時にカメラやセンサーが<br>一時停止することがあります。<br>
            続けて測定を行う場合は、<br>下のボタンを押してください。
        </p>
        <button class="btn-restart" onclick="reconnectSensor()">🔄 センサー再許可・次へ進む</button>
    </div>

    <div class="top-info" id="top-ui" style="display:none;">
        <div class="debug-info">Sensor Raw: <span id="raw-beta">--</span></div>
        <div class="angle-display" id="angle-val">--°</div>
        <button class="toggle-btn" onclick="toggleInvert()">🔄 角度のプラス/マイナスを反転</button>
        
        <div class="zoom-control">
            <span style="font-size: 1.2rem;">🔍</span>
            <input type="range" id="zoom-slider" min="1" max="10" step="0.1" value="1" oninput="updateZoom()">
            <span id="zoom-val" style="font-weight: bold; width: 45px; text-align: right;">1.0x</span>
        </div>
    </div>

    <div class="ui-container" id="main-ui">
        <div class="control-panel">
            <div style="margin-bottom:15px;">
                <label>ポール等の高さ: </label>
                <select id="pole-height"></select> m
            </div>
            
            <div class="step-dots">
                <div id="dot1" class="dot active"></div>
                <div id="dot2" class="dot"></div>
                <div id="dot3" class="dot"></div>
            </div>

            <div id="status-text" style="font-weight:bold; margin-bottom:10px; font-size:1.1rem;">① ポール根元 を狙う</div>
            <button class="btn-primary" id="btn-action" onclick="measureStep()">測定</button>
        </div>
    </div>

    <div class="result-overlay" id="result-view">
        <div class="result-box">
            <div>測定結果</div>
            <div class="big-number"><span id="res-height">0.0</span> m</div>
            <div style="color:#666; margin-bottom:20px; font-size:0.9rem;">
                水平距離: <span id="res-dist">--</span> m
            </div>
            <button class="btn-info" onclick="startScreenshotMode()">📷 全体像をスクショ保存</button>
            <button class="btn-secondary" onclick="resetApp()">保存せずに次へ</button>
        </div>
    </div>

    <div id="screenshot-ui">
        <div class="screenshot-info" id="screenshot-info-box">
            樹高: <span id="ss-height">--</span> m<br>
            <span id="ss-gps" style="font-size:0.9rem; font-weight:normal;">位置情報取得中...</span>
        </div>
        <div class="screenshot-controls">
            <button class="btn-success" style="font-size:1.5rem; padding:20px;" onclick="takeScreenshot()">⭕ 合成して保存 (ダウンロード)</button>
            <button class="btn-secondary" onclick="resetApp()">キャンセル (次へ)</button>
        </div>
    </div>

    <script>
        // 変数
        let currentAngle = 0;
        let rawBeta = 0;
        let step = 1;
        let angles = { 1: null, 2: null, 3: null }; 
        let isInverted = false;
        
        let finalHeightVal = "0.0";
        let currentLat = null;
        let currentLon = null;

        // 高さリスト生成
        const select = document.getElementById('pole-height');
        for(let i=1; i<=10; i++){
            let opt = document.createElement('option');
            opt.value = i; opt.text = i;
            if(i===2) opt.selected = true;
            select.appendChild(opt);
        }

        // スタート処理
        async function startApp() {
            const errLog = document.getElementById('error-log');
            errLog.textContent = "起動中...";

            try {
                if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    const permission = await DeviceOrientationEvent.requestPermission();
                    if (permission !== 'granted') {
                        throw new Error("センサーの許可が拒否されました");
                    }
                }

                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: 'environment',
                        width: { ideal: 1920, max: 3840 },
                        height: { ideal: 1080, max: 2160 }
                    } 
                });
                document.getElementById('camera-view').srcObject = stream;
                window.addEventListener('deviceorientation', handleOrientation);

                document.getElementById('start-overlay').style.display = 'none';
                document.getElementById('top-ui').style.display = 'block';
                document.getElementById('main-ui').style.display = 'flex';

            } catch (e) {
                console.error(e);
                errLog.textContent = "エラー: " + e.message;
                alert("起動エラー: " + e.message);
            }
        }

        // 🌟 画像保存後のセンサー強制再起動ロジック
        async function reconnectSensor() {
            try {
                // ユーザーアクションをトリガーにして再度権限確認・カメラ復旧を行う
                if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    await DeviceOrientationEvent.requestPermission();
                }

                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: 'environment',
                        width: { ideal: 1920, max: 3840 },
                        height: { ideal: 1080, max: 2160 }
                    } 
                });
                document.getElementById('camera-view').srcObject = stream;
                
                // オーバーレイを隠して通常状態へリセット
                document.getElementById('restart-overlay').style.display = 'none';
                resetApp();
            } catch (e) {
                console.error(e);
                alert("再起動エラー: " + e.message + "\nページをリロードしてください。");
                document.getElementById('restart-overlay').style.display = 'none';
                resetApp();
            }
        }

        function handleOrientation(event) {
            let beta = event.beta; 
            if (beta === null) return;
            
            rawBeta = beta;
            document.getElementById('raw-beta').textContent = beta.toFixed(1);

            let tilt = 90 - beta;
            if (isInverted) tilt = -1 * tilt;
            currentAngle = tilt;
            document.getElementById('angle-val').textContent = currentAngle.toFixed(1) + "°";

            // リアルタイム表示
            if (step === 3 && angles[1] !== null && angles[2] !== null) {
                const h = parseFloat(document.getElementById('pole-height').value);
                const r1 = angles[1] * (Math.PI / 180);
                const r2 = angles[2] * (Math.PI / 180);
                const r3 = currentAngle * (Math.PI / 180);

                const t1 = Math.tan(r1);
                const t2 = Math.tan(r2);
                const t3 = Math.tan(r3);

                if (Math.abs(t2 - t1) > 0.0001) {
                    let H = h * (t3 - t1) / (t2 - t1);
                    document.getElementById('realtime-height').textContent = Math.abs(H).toFixed(1) + " m";
                }
            }
        }

        function toggleInvert() {
            isInverted = !isInverted;
        }

        function updateZoom() {
            const zoomVal = document.getElementById('zoom-slider').value;
            document.getElementById('zoom-val').textContent = parseFloat(zoomVal).toFixed(1) + "x";
            document.getElementById('camera-view').style.transform = `scale(${zoomVal})`;
        }

        function measureStep() {
            angles[step] = currentAngle;

            if(step === 1) {
                document.getElementById('dot1').classList.replace('active', 'done');
                document.getElementById('dot2').classList.add('active');
                document.getElementById('status-text').textContent = "② ポール上端 を狙う";
                step++;
            } else if (step === 2) {
                document.getElementById('dot2').classList.replace('active', 'done');
                document.getElementById('dot3').classList.add('active');
                document.getElementById('status-text').textContent = "③ 木の頂点 を狙う";
                document.getElementById('btn-action').textContent = "計算実行";
                document.getElementById('btn-action').style.backgroundColor = "#28a745";
                
                document.getElementById('realtime-height').style.display = 'block';
                step++;
            } else if (step === 3) {
                calcResult();
            }
        }

        function calcResult() {
            document.getElementById('realtime-height').style.display = 'none';

            const h = parseFloat(document.getElementById('pole-height').value);
            const r1 = angles[1] * (Math.PI / 180);
            const r2 = angles[2] * (Math.PI / 180);
            const r3 = angles[3] * (Math.PI / 180);

            const t1 = Math.tan(r1);
            const t2 = Math.tan(r2);
            const t3 = Math.tan(r3);

            if (Math.abs(t2 - t1) < 0.0001) {
                alert("エラー: 角度差が小さすぎます。もう少し木に近づくか、離れてください。");
                resetApp();
                return;
            }

            let H = h * (t3 - t1) / (t2 - t1);
            let D = h / (t2 - t1);

            finalHeightVal = Math.abs(H).toFixed(1);

            document.getElementById('res-height').textContent = finalHeightVal;
            document.getElementById('res-dist').textContent = Math.abs(D).toFixed(1);
            
            document.getElementById('result-view').style.display = 'flex';
        }

        function startScreenshotMode() {
            document.getElementById('result-view').style.display = 'none';
            document.getElementById('main-ui').style.display = 'none';
            document.getElementById('top-ui').style.display = 'none';
            document.getElementById('ch-h').style.display = 'none';
            document.getElementById('ch-v').style.display = 'none';

            document.getElementById('zoom-slider').value = 1;
            updateZoom();

            document.getElementById('screenshot-ui').style.display = 'flex';
            document.getElementById('ss-height').textContent = finalHeightVal;
            document.getElementById('ss-gps').textContent = "GPS取得中...";

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        currentLat = pos.coords.latitude;
                        currentLon = pos.coords.longitude;
                        document.getElementById('ss-gps').innerHTML = `Lat: ${currentLat.toFixed(5)}<br>Lon: ${currentLon.toFixed(5)}`;
                    },
                    (err) => {
                        document.getElementById('ss-gps').textContent = "GPS取得失敗";
                    },
                    { enableHighAccuracy: true, timeout: 5000 }
                );
            } else {
                document.getElementById('ss-gps').textContent = "GPS非対応端末です";
            }
        }

        function takeScreenshot() {
            const video = document.getElementById('camera-view');
            const canvas = document.createElement('canvas');
            
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');

            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            const fontSize = Math.floor(canvas.width * 0.03); 
            ctx.font = `bold ${fontSize}px sans-serif`;
            ctx.fillStyle = "#ffffff";
            ctx.strokeStyle = "#000000";
            ctx.lineWidth = Math.max(2, fontSize / 10);

            const textHeight = `樹高: ${finalHeightVal} m`;
            const textGPS = currentLat ? `Lat: ${currentLat.toFixed(5)}, Lon: ${currentLon.toFixed(5)}` : "GPSデータなし";
            const dateStr = new Date().toLocaleString();

            const marginX = fontSize;
            const marginY = fontSize * 1.5;

            ctx.strokeText(textHeight, marginX, marginY);
            ctx.fillText(textHeight, marginX, marginY);
            
            ctx.strokeText(textGPS, marginX, marginY + fontSize * 1.2);
            ctx.fillText(textGPS, marginX, marginY + fontSize * 1.2);

            ctx.strokeText(dateStr, marginX, marginY + fontSize * 2.4);
            ctx.fillText(dateStr, marginX, marginY + fontSize * 2.4);

            const dataURL = canvas.toDataURL('image/jpeg', 0.9);
            const a = document.createElement('a');
            a.href = dataURL;
            const timeTag = new Date().toISOString().replace(/[:.]/g, '-').slice(0,19);
            a.download = `TreeHeight_${timeTag}.jpg`;
            a.click();

            // 🌟 画像ダウンロード後、UIを「再起動オーバーレイ」へ切り替え
            document.getElementById('screenshot-ui').style.display = 'none';
            document.getElementById('restart-overlay').style.display = 'flex';
        }

        function resetApp() {
            step = 1;
            angles = { 1: null, 2: null, 3: null };
            currentLat = null;
            currentLon = null;
            
            document.getElementById('result-view').style.display = 'none';
            document.getElementById('screenshot-ui').style.display = 'none';
            document.getElementById('realtime-height').style.display = 'none';
            
            document.getElementById('top-ui').style.display = 'block';
            document.getElementById('main-ui').style.display = 'flex';
            document.getElementById('ch-h').style.display = 'block';
            document.getElementById('ch-v').style.display = 'block';
            
            document.getElementById('dot1').className = "dot active";
            document.getElementById('dot2').className = "dot";
            document.getElementById('dot3').className = "dot";
            
            document.getElementById('status-text').textContent = "① ポール根元 を狙う";
            document.getElementById('btn-action').textContent = "測定";
            document.getElementById('btn-action').style.backgroundColor = "#007bff";
            
            document.getElementById('zoom-slider').value = 1;
            updateZoom();
        }
    </script>
    
    <script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
            navigator.serviceWorker.register('./sw.js');
        });
      }
    </script>
</body>
</html>
